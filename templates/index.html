<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Flashcard Manager</title>
    <!-- MathJax (محلی) -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="{{ url_for('static', filename='js/mathjax/tex-svg.js') }}" async></script>
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="app-header">
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle categories menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <h1>📇 Flashcard Manager</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="container">
        <!-- سایدبار -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <h2>Categories</h2>
                <ul class="category-list" id="categoryList"></ul>
                <div class="add-cat-form">
                    <input type="text" id="newCatInput" placeholder="New category..." aria-label="New category name">
                    <button id="addCatBtn" aria-label="Add category">+</button>
                </div>
            </div>
        </aside>

        <!-- محتوای اصلی -->
        <main class="main">
            <div class="cards-header">
                <h2 id="currentCategoryTitle">Select a category</h2>
                <button class="btn-add" id="addCardBtn" disabled>+ Add Flashcard</button>
            </div>
            <div id="cardsContainer">
                <div class="empty-msg">Choose a category to see flashcards</div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal">
            <h3 id="modalTitle">Add Flashcard</h3>
            <label for="modalCategory">Category</label>
            <select id="modalCategory"></select>
            <label for="modalFront">Front (use $...$ for LaTeX)</label>
            <textarea id="modalFront" rows="2"></textarea>
            <label for="modalBack">Back (description — supports Markdown)</label>
            <textarea id="modalBack" rows="3"></textarea>
            <div class="form-actions">
                <button class="btn-cancel" id="modalCancel">Cancel</button>
                <button class="btn-save" id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- کتابخانه‌های محلی -->
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/purify.min.js') }}"></script>
    <!-- فایل اصلی اپلیکیشن -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
